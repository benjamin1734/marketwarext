name: Build Epoch Frontline APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'release/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout build payload
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Restore Android project
        shell: bash
        run: |
          set -euo pipefail
          cat payload/p4_* > epoch-frontline.b64
          base64 --decode epoch-frontline.b64 > epoch-frontline.tar.gz
          echo "2d77dec9037785573c47c92cb6275045e29c76acb561dc86beef769417de8e06  epoch-frontline.tar.gz" | sha256sum -c -
          tar -xzf epoch-frontline.tar.gz
          test -f epoch_frontline_android_v2/app/build.gradle

      - name: Build debug APK
        working-directory: epoch_frontline_android_v2
        run: gradle :app:assembleDebug --stacktrace

      - name: Validate APK
        shell: bash
        run: |
          set -euo pipefail
          APK=epoch_frontline_android_v2/app/build/outputs/apk/debug/app-debug.apk
          test -s "$APK"
          mkdir -p release
          cp "$APK" release/EpochFrontline-v2.0.0-debug.apk
          sha256sum release/EpochFrontline-v2.0.0-debug.apk > release/EpochFrontline-v2.0.0-debug.apk.sha256
          ls -lh release/EpochFrontline-v2.0.0-debug.apk

      - name: Publish APK to repository
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add release/EpochFrontline-v2.0.0-debug.apk release/EpochFrontline-v2.0.0-debug.apk.sha256
          git commit -m "Publish Epoch Frontline v2 APK" || exit 0
          git push origin HEAD:main

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: EpochFrontline-v2-APK
          path: |
            release/EpochFrontline-v2.0.0-debug.apk
            release/EpochFrontline-v2.0.0-debug.apk.sha256
          if-no-files-found: error
          retention-days: 7
